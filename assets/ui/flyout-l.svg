<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Backwards-L: corner is at the bottom-right (26,26). Horizontal arm goes left, vertical arm goes up. -->
