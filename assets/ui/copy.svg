<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Two overlapping rounded rectangles: VS Code-style copy icon. -->
  <!-- Back sheet -->
  <rect x="11" y="7" width="14" height="16" rx="2" ry="2" stroke="#FFFFFF" stroke-width="2" />
  <!-- Front sheet (offset down-left, covers part of back) -->
  <rect x="7" y="11" width="14" height="16" rx="2" ry="2" stroke="#FFFFFF" stroke-width="2" fill="none" />
</svg>
