<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Forerunner 3</title><style>body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { border: 1px solid #333; }
    #ui { position: fixed; top: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; }
    #ui * { pointer-events: auto; }
    #ui-bottom { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; }
    #ui-bottom * { pointer-events: auto; }
    #ui *, #ui-bottom * { transition: color 300ms ease, background 300ms ease, background-color 300ms ease, border-color 300ms ease; }

    /* --- Loading screen --- */
    #loader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loader-overlay.fade-out { opacity: 0; pointer-events: none; }
    #loader-title {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 22px; font-weight: 300; letter-spacing: 4px;
      color: #ccc; margin-bottom: 4px; user-select: none;
    }
    #loader-subtitle {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; font-weight: 400; letter-spacing: 2px;
      user-select: none;
      background: linear-gradient(90deg, #888 0%, #ddd 40%, #888 80%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    #loader-canvas { margin-top: 16px; }</style><script defer="defer" src="tles.js" onerror=""></script><script defer="defer" src="bundle.js"></script></head><body><div id="loader-overlay"><div id="loader-title">FORERUNNER 3.0</div><div id="loader-subtitle">Loading...</div><canvas id="loader-canvas"></canvas></div><div id="ui"></div><canvas id="canvas" width="800" height="600"></canvas><div id="ui-bottom"></div><div id="ui-modals"></div><script>// ============================================================
  //  Loading screen — self-contained, no external dependencies
  // ============================================================
  (function() {
    var cv = document.getElementById('loader-canvas');
    var ctx = cv.getContext('2d');
    var running = true;
    var startTime = Date.now();

    // --- Sizing ---
    function resize() {
      var dpr = window.devicePixelRatio || 1;
      var dim = Math.min(window.innerWidth, window.innerHeight);
      var size = Math.round(dim * 0.55); // canvas covers enough area for orbits
      cv.width = size * dpr;
      cv.height = size * dpr;
      cv.style.width = size + 'px';
      cv.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // --- Constants ---
    function getR() { return Math.min(cv.clientWidth, cv.clientHeight) * 0.20; }
    var TAU = Math.PI * 2;

    // --- Simple hash-based noise for planet dots ---
    function hash(x, y) {
      var n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    // --- Generate planet surface dots (once, in spherical coords) ---
    var planetDots = [];
    (function() {
      for (var i = 0; i < 600; i++) {
        var lat = (Math.random() - 0.5) * Math.PI;
        var lon = Math.random() * TAU;
        var n = hash(Math.floor(lon * 5), Math.floor(lat * 5 + 10));
        // ~65% water (blue), ~35% land (green)
        var isLand = n > 0.60;
        planetDots.push({ lat: lat, lon: lon, land: isLand });
      }
    })();

    // --- Generate satellite orbits ---
    var MAX_SATS = 100;
    var satellites = [];
    (function() {
      for (var i = 0; i < MAX_SATS; i++) {
        var incl = (Math.random() - 0.5) * 60 * (Math.PI / 180); // ±30 degrees
        var raan = Math.random() * TAU;                           // orbital plane rotation
        var alt = 1.3 + Math.random() * 0.9;                      // 1.3R to 2.2R from center
        var speed = 0.3 + Math.random() * 0.5;                    // angular speed variation
        var phase = Math.random() * TAU;                           // starting position
        satellites.push({
          incl: incl, raan: raan, alt: alt,
          speed: speed, phase: phase,
          spawnTime: (i + 1) * 1000, // spawn every 1000ms
          opacity: 0
        });
      }
    })();

    // --- 3D projection (simple perspective) ---
    function project(x, y, z, cx, cy, R) {
      // Rotate around Y axis for spin
      var scale = R * 2.8 / (2.8 + z); // mild perspective
      return { x: cx + x * scale, y: cy - y * scale, z: z, scale: scale / R };
    }

    function rotY(x, y, z, a) {
      var c = Math.cos(a), s = Math.sin(a);
      return { x: x * c + z * s, y: y, z: -x * s + z * c };
    }

    function rotX(x, y, z, a) {
      var c = Math.cos(a), s = Math.sin(a);
      return { x: x, y: y * c - z * s, z: y * s + z * c };
    }

    // --- Orbit position from orbital elements ---
    function satPosition(sat, angle) {
      // Position in orbital plane
      var ox = Math.cos(angle) * sat.alt;
      var oy = Math.sin(angle) * sat.alt;
      // Apply inclination (tilt out of equatorial plane)
      var r1 = rotX(ox, oy, 0, sat.incl);
      // Apply RAAN (rotate orbital plane around Y)
      var r2 = rotY(r1.x, r1.y, r1.z, sat.raan);
      return r2;
    }

    // --- Draw frame ---
    function draw() {
      if (!running) return;
      var w = cv.clientWidth;
      var h = cv.clientHeight;
      var cx = w / 2;
      var cy = h / 2;
      var R = getR();
      var elapsed = (Date.now() - startTime) / 1000;
      var spinAngle = elapsed * 0.15; // gentle spin

      ctx.clearRect(0, 0, w, h);

      // === Wireframe Earth ===
      // Longitude lines
      ctx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
      ctx.lineWidth = 0.5;
      for (var lon = 0; lon < 12; lon++) {
        var lonAngle = lon * (TAU / 12);
        ctx.beginPath();
        for (var t = 0; t <= 64; t++) {
          var lat = (t / 64) * Math.PI - Math.PI / 2;
          var px = Math.cos(lat) * Math.cos(lonAngle + spinAngle) * R;
          var py = Math.sin(lat) * R;
          var pz = Math.cos(lat) * Math.sin(lonAngle + spinAngle) * R;
          var p = project(px, py, pz, cx, cy, R);
          if (t === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      }

      // Latitude lines
      for (var lat = -2; lat <= 2; lat++) {
        var latAngle = lat * (Math.PI / 6);
        ctx.beginPath();
        for (var t = 0; t <= 64; t++) {
          var lonA = (t / 64) * TAU + spinAngle;
          var px = Math.cos(latAngle) * Math.cos(lonA) * R;
          var py = Math.sin(latAngle) * R;
          var pz = Math.cos(latAngle) * Math.sin(lonA) * R;
          var p = project(px, py, pz, cx, cy, R);
          if (t === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      }

      // === Planet surface dots (blue water, green land) ===
      for (var i = 0; i < planetDots.length; i++) {
        var d = planetDots[i];
        var px = Math.cos(d.lat) * Math.cos(d.lon + spinAngle) * R;
        var py = Math.sin(d.lat) * R;
        var pz = Math.cos(d.lat) * Math.sin(d.lon + spinAngle) * R;
        // Only draw front-facing dots
        if (pz > 0) continue; // behind the sphere center (facing away)
        var p = project(px, py, pz, cx, cy, R);
        var dotAlpha = 0.5 + 0.3 * (-pz / R);
        ctx.fillStyle = d.land
          ? 'rgba(80, 180, 80, ' + dotAlpha + ')'
          : 'rgba(70, 130, 200, ' + dotAlpha + ')';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.2 * p.scale, 0, TAU);
        ctx.fill();
      }

      // === Satellites + orbit trails ===
      var elapsedMs = Date.now() - startTime;
      for (var i = 0; i < MAX_SATS; i++) {
        var sat = satellites[i];
        if (elapsedMs < sat.spawnTime) continue;

        // Fade in over 800ms
        var fadeAge = elapsedMs - sat.spawnTime;
        sat.opacity = Math.min(1, fadeAge / 800);

        var currentAngle = sat.phase + elapsed * sat.speed;

        // --- Orbit trail ---
        var trailSegments = 48;
        var trailSpan = TAU * 0.92; // trail covers ~92% of orbit, gap before satellite
        // Grow trail from 0 to full over first 3 seconds after spawn
        var trailGrowth = Math.min(1, fadeAge / 3000);
        var actualSpan = trailSpan * trailGrowth;

        for (var t = 0; t < trailSegments - 1; t++) {
          var frac0 = t / trailSegments;
          var frac1 = (t + 1) / trailSegments;
          var a0 = currentAngle - actualSpan * frac0;
          var a1 = currentAngle - actualSpan * frac1;
          var pos0 = satPosition(sat, a0);
          var pos1 = satPosition(sat, a1);
          var r0 = rotY(pos0.x * R, pos0.y * R, pos0.z * R, spinAngle);
          var r1 = rotY(pos1.x * R, pos1.y * R, pos1.z * R, spinAngle);
          var p0 = project(r0.x, r0.y, r0.z, cx, cy, R);
          var p1 = project(r1.x, r1.y, r1.z, cx, cy, R);

          // Opacity fades along trail: full near satellite (frac=0), zero at tail (frac=1)
          var segAlpha = (1 - frac1) * sat.opacity * 0.5;
          ctx.strokeStyle = 'rgba(180, 180, 180, ' + segAlpha + ')';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p0.x, p0.y);
          ctx.lineTo(p1.x, p1.y);
          ctx.stroke();
        }

        // --- Satellite dot ---
        var pos = satPosition(sat, currentAngle);
        var rp = rotY(pos.x * R, pos.y * R, pos.z * R, spinAngle);
        var sp = project(rp.x, rp.y, rp.z, cx, cy, R);
        ctx.fillStyle = 'rgba(100, 149, 237, ' + sat.opacity + ')'; // azure blue #6495ED
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, 1.5 * sp.scale, 0, TAU);
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    // --- Hide loader (called by main app) ---
    window.hideLoader = function() {
      running = false;
      var overlay = document.getElementById('loader-overlay');
      if (!overlay) return;
      overlay.classList.add('fade-out');
      setTimeout(function() {
        overlay.remove();
        window.removeEventListener('resize', resize);
      }, 900);
    };
  })();</script></body></html>
