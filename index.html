<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Forerunner 3</title><style>body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { border: 1px solid #333; }
    #ui { position: fixed; top: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; }
    #ui * { pointer-events: auto; }
    #ui-bottom { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; }
    #ui-bottom * { pointer-events: auto; }
    #ui *, #ui-bottom * { transition: color 300ms ease, background 300ms ease, background-color 300ms ease, border-color 300ms ease; }

    /* --- Loading screen --- */
    #loader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loader-overlay.fade-out { opacity: 0; pointer-events: none; }

    #loader-container {
      width: 250px;
      display: flex; flex-direction: column; align-items: center;
    }

    #loader-title {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 22px; font-weight: 300; letter-spacing: 4px;
      color: #ccc; margin-bottom: 4px; user-select: none;
    }
    #loader-subtitle {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; font-weight: 400; letter-spacing: 2px;
      user-select: none; margin-bottom: 16px;
      background: linear-gradient(90deg, #888 0%, #ddd 40%, #888 80%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Progress bar track — dark recessed socket */
    #loader-bar-track {
      width: 200px; height: 6px;
      background: #0a0a0a;
      border-radius: 3px;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.8), inset 0 0 1px rgba(0, 0, 0, 0.5);
      border: 1px solid #222;
      overflow: hidden;
    }

    /* Progress bar fill — white/gray animated gradient (darker gray for visibility) */
    #loader-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #777 0%, #ddd 50%, #777 100%);
      background-size: 200% 100%;
      animation: bar-shimmer 1.5s ease-in-out infinite;
      transition: width 0.15s ease-out;
    }
    @keyframes bar-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Status text */
    #loader-status {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px; font-weight: 400;
      color: #666; margin-top: 8px;
      user-select: none; letter-spacing: 0.5px;
    }

    /* Astronaut quote — shown during loading */
    #loader-quote {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px; font-weight: 300; font-style: italic;
      color: #fff; margin-top: 16px;
      user-select: none; text-align: center;
      line-height: 1.4;
      max-width: 250px;
    }</style></head><body><div id="loader-overlay"><div id="loader-container"><div id="loader-title">FORERUNNER 3.0</div><div id="loader-subtitle">Loading...</div><div id="loader-bar-track"><div id="loader-bar-fill"></div></div><div id="loader-status">Preparing...</div><div id="loader-quote"></div></div></div><div id="ui"></div><canvas id="canvas" width="800" height="600"></canvas><div id="ui-bottom"></div><div id="ui-modals"></div><script>// ============================================================
  //  Loading screen — dual-path script loader with progress tracking
  //
  //  TWO LOADING PATHS:
  //
  //  PATH 1 — HTTP/HTTPS (dev server, production, GitHub Pages):
  //    Uses fetch() + ReadableStream to download scripts in PARALLEL
  //    with byte-accurate progress tracking via Content-Length headers.
  //    Once all downloads finish, scripts are injected in ORDER
  //    (tles.js before bundle.js) since bundle depends on TLE data.
  //
  //  PATH 2 — file:// (opening dist/index.html directly):
  //    fetch() is blocked by CORS on the file:// protocol, so we fall
  //    back to injecting <script src="..."> tags sequentially. Progress
  //    is stage-based (jumps per file) rather than byte-accurate, but
  //    everything loads and executes correctly.
  //
  //  ADDING NEW SCRIPTS:
  //    Just add an entry to the FILES array. Both paths use it.
  //    Scripts download in parallel (PATH 1) but always execute in
  //    the order listed.
  //
  //  LOADER LIFECYCLE:
  //    The loader stays visible until the main app calls window.hideLoader()
  //    after its first frame renders. This prevents a blank flash between
  //    the loader fading out and the WebGL canvas being ready.
  //    See main.ts: if (!loaderHidden) { window.hideLoader(); }
  // ============================================================
  (function() {
    // --- Configurable resource list ---
    // Add new scripts here. They download in parallel but execute in this order.
    var FILES = [
      { url: 'tles.js',   label: 'TLE data' },
      { url: 'bundle.js', label: 'application' }
    ];

    var barFill = document.getElementById('loader-bar-fill');
    var statusEl = document.getElementById('loader-status');
    var isFileProtocol = window.location.protocol === 'file:';

    // ================================================================
    //  PATH 1 — HTTP/HTTPS: fetch() with byte-accurate progress
    // ================================================================
    function loadViaFetch() {
      // Track download state for each file
      var fileStates = FILES.map(function(f) {
        return { url: f.url, label: f.label, loaded: 0, total: 0, done: false, text: null };
      });

      // --- Update progress bar and status text ---
      function updateProgress() {
        var totalBytes = 0;
        var loadedBytes = 0;
        var activeLabels = [];

        for (var i = 0; i < fileStates.length; i++) {
          var s = fileStates[i];
          totalBytes += s.total;
          loadedBytes += s.loaded;
          if (!s.done) activeLabels.push(s.label);
        }

        // Calculate percentage. If Content-Length was missing for any file,
        // total might be 0 — show indeterminate state.
        var pct = totalBytes > 0 ? Math.min(100, (loadedBytes / totalBytes) * 100) : 0;
        barFill.style.width = pct + '%';

        if (activeLabels.length > 0) {
          statusEl.textContent = 'Loading ' + activeLabels.join(' & ') + '...';
        } else {
          statusEl.textContent = 'Initializing...';
        }
      }

      // --- Fetch a single file with byte-level streaming progress ---
      function fetchWithProgress(index) {
        var file = FILES[index];
        var state = fileStates[index];

        return fetch(file.url).then(function(response) {
          var contentLength = response.headers.get('Content-Length');
          state.total = contentLength ? parseInt(contentLength, 10) : 0;

          // If no ReadableStream support or no Content-Length, simple fallback
          if (!response.body || !contentLength) {
            return response.text().then(function(text) {
              state.text = text;
              state.loaded = state.total || text.length;
              state.total = state.loaded;
              state.done = true;
              updateProgress();
            });
          }

          // Stream the response, tracking bytes as they arrive
          var reader = response.body.getReader();
          var chunks = [];
          var received = 0;

          function read() {
            return reader.read().then(function(result) {
              if (result.done) {
                var blob = new Blob(chunks);
                return blob.text().then(function(text) {
                  state.text = text;
                  state.done = true;
                  updateProgress();
                });
              }
              chunks.push(result.value);
              received += result.value.length;
              state.loaded = received;
              updateProgress();
              return read();
            });
          }

          return read();
        });
      }

      // --- Inject a script from downloaded text ---
      function injectScript(text) {
        return new Promise(function(resolve) {
          var script = document.createElement('script');
          script.textContent = text;
          document.body.appendChild(script);
          resolve();
        });
      }

      // Fetch all files in parallel for fastest download
      var fetches = FILES.map(function(_, i) {
        return fetchWithProgress(i);
      });

      // Once all downloads complete, inject scripts in order.
      // Order matters: tles.js sets up global TLE data that bundle.js
      // needs at parse time. Injecting out of order would crash the app.
      Promise.all(fetches).then(function() {
        statusEl.textContent = 'Initializing...';

        var chain = Promise.resolve();
        for (var i = 0; i < fileStates.length; i++) {
          (function(idx) {
            chain = chain.then(function() {
              return injectScript(fileStates[idx].text);
            });
          })(i);
        }
        return chain;
      }).catch(function(err) {
        statusEl.textContent = 'Error loading: ' + err.message;
        console.error('Loader error:', err);
      });
    }

    // ================================================================
    //  PATH 2 — file:// : <script src> tags with stage-based progress
    //  fetch() is blocked by CORS on file://, so we inject <script> tags
    //  with src attributes, which the browser loads natively. Progress
    //  jumps per-file (not byte-accurate) but everything works correctly.
    // ================================================================
    function loadViaScriptTags() {
      var loaded = 0;
      var total = FILES.length;

      // Load scripts one at a time, in order, to guarantee dependencies.
      // tles.js must finish executing before bundle.js is loaded.
      function loadNext(index) {
        if (index >= total) {
          statusEl.textContent = 'Initializing...';
          barFill.style.width = '100%';
          return;
        }

        var file = FILES[index];
        statusEl.textContent = 'Loading ' + file.label + '...';

        var script = document.createElement('script');
        script.src = file.url;

        script.onload = function() {
          loaded++;
          // Stage-based progress: each file is an equal fraction of the bar.
          // Not byte-proportional, but functional for file:// usage.
          barFill.style.width = ((loaded / total) * 100) + '%';
          loadNext(index + 1);
        };

        script.onerror = function() {
          statusEl.textContent = 'Error loading ' + file.label;
          console.error('Failed to load:', file.url);
        };

        document.body.appendChild(script);
      }

      loadNext(0);
    }

    // --- Choose loading path based on protocol ---
    if (isFileProtocol) {
      // file:// — use script tags (fetch is blocked by CORS)
      loadViaScriptTags();
    } else {
      // http(s):// — use fetch with streaming progress
      loadViaFetch();
    }

    // --- Astronaut quotes — shown as a reward before "drawing the curtains" ---
    var QUOTES = [
      '"That\'s one small step for man, one giant leap for mankind." \u2014 Neil Armstrong',
      '"The Earth is the cradle of humanity, but one cannot live in a cradle forever." \u2014 Konstantin Tsiolkovsky',
      '"I looked and looked but I didn\'t see God." \u2014 Yuri Gagarin',
      '"The sky is not the limit. It\'s just the view." \u2014 Buzz Aldrin',
      '"For all its material advantages, the sedentary life has left us edgy, unfulfilled." \u2014 Carl Sagan',
      '"Once you\'ve been in space, you appreciate how small and fragile the Earth is." \u2014 Valentina Tereshkova',
      '"Exploration is really the essence of the human spirit." \u2014 Frank Borman',
      '"Somewhere, something incredible is waiting to be known." \u2014 Carl Sagan',
      '"The universe is under no obligation to make sense to you." \u2014 Neil deGrasse Tyson',
      '"To confine our attention to terrestrial matters would be to limit the human spirit." \u2014 Stephen Hawking',
      '"I know the sky is not the limit, because there are footprints on the Moon." \u2014 Buzz Aldrin',
      '"Earth is a very small stage in a vast cosmic arena." \u2014 Carl Sagan',
      '"The stars don\'t look bigger, but they do look brighter." \u2014 Sally Ride',
      '"Space is for everybody. It\'s not just for a few people in science or math." \u2014 Christa McAuliffe'
    ];

    // Show a random quote immediately while loading
    var quoteEl = document.getElementById('loader-quote');
    if (quoteEl) {
      quoteEl.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    }

    // --- Hide loader ---
    // Called by the main app (main.ts) after its first frame renders.
    // Holds for ~1 second to let assets settle and give the user a moment
    // to read the quote, then fades out the loader overlay.
    // The main app contains: if (!loaderHidden) { window.hideLoader(); }
    window.hideLoader = function() {
      var overlay = document.getElementById('loader-overlay');
      if (!overlay) return;

      // Hold for 1 second to let assets settle, then fade out
      setTimeout(function() {
        overlay.classList.add('fade-out');
        setTimeout(function() { overlay.remove(); }, 900);
      }, 1000);
    };
  })();</script></body></html>
